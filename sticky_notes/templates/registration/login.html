{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login</h2>

    <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-gray-700 font-semibold mb-2">Username</label>
            <input type="text" name="username" required
                class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none bg-gray-50">
        </div>

        <div>
            <label class="block text-gray-700 font-semibold mb-2">Password</label>
            <input type="password" name="password" required
                class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none bg-gray-50">
        </div>

        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 border-2 border-blue-800 rounded shadow-md mt-6 transition-colors">
            Login
        </button>
    </form>
</div>


{% endblock %}
