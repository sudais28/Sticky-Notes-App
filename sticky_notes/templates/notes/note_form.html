{% extends "base.html" %}

{% block content %}

<div class="max-w-xl mx-auto">
    <div class="mb-8 flex items-center justify-between">
        <a href="{% url 'note_list' %}" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors font-bold handwritten text-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Board
        </a>
    </div>

    <form method="post" class="p-10 shadow-2xl relative transform rotate-1 flex flex-col" style="background-color: #fef08a; min-height: 500px;">
        <div class="note-pin"></div>
        {% csrf_token %}

        <div class="mb-6">
            <label class="block text-[10px] font-bold uppercase tracking-widest text-black/30 mb-1 ml-1">Title of the note</label>
            {{ form.title }}
        </div>

        <div class="flex-grow mb-6">
            <label class="block text-[10px] font-bold uppercase tracking-widest text-black/30 mb-1 ml-1">Write your thoughts</label>
            {{ form.content }}
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 pt-6 border-t border-black/5">
            <div class="space-y-1">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-black/30 ml-1">Priority</label>
                {{ form.priority }}
            </div>
            <div class="space-y-1">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-black/30 ml-1">Category</label>
                {{ form.category }}
            </div>
            <div class="space-y-1">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-black/30 ml-1">Note Color</label>
                {{ form.color }}
            </div>
        </div>

        <div class="flex gap-4">
            <button type="submit"
                class="flex-[2] bg-black text-white font-bold py-4 rounded-xl shadow-lg hover:bg-slate-800 transition-all transform active:scale-95">
                Stick it!
            </button>
            <a href="{% url 'note_list' %}"
                class="flex-1 bg-black/5 hover:bg-black/10 text-black font-bold py-4 text-center rounded-xl transition-all">
                Discard
            </a>
        </div>
    </form>
</div>

{% endblock %}
