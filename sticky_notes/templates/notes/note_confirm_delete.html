{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto p-10 shadow-xl relative transform -rotate-1 text-center" style="background-color: #fca5a5;">
    <div class="note-pin" style="background: #ef4444;"></div>
    
    <h2 class="text-3xl font-bold text-black/80 handwritten mb-4">Throw away?</h2>
    <p class="text-black/60 font-medium mb-8">Are you sure you want to crumble up <span class="font-bold text-black/80">"{{ object.title }}"</span> and throw it in the trash?</p>
    
    <form method="post" class="flex flex-col gap-3">
        {% csrf_token %}
        <button type="submit" class="w-full py-4 bg-black text-white font-bold rounded-xl shadow-lg hover:bg-slate-800 transition-all">
            Yes, Trash it
        </button>
        <a href="{% url 'note_list' %}" class="w-full py-4 bg-black/5 hover:bg-black/10 text-black font-bold rounded-xl transition-all">
            No, Save it
        </a>
    </form>
</div>
{% endblock %}
